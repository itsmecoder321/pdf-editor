<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Studio Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gurmukhi:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/regenerator-runtime@0.14.1/runtime.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3250;
            --accent: #5b6ef5;
            --accent2: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --text: #e2e8f0;
            --muted: #64748b;
            --toolbar-h: 56px;
            --sidebar-w: 260px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Gurmukhi / Punjabi font alias */
        @font-face {
            font-family: 'NotoSansGurmukhi';
            src: local('Noto Sans Gurmukhi');
        }
        /* Ensure Gurmukhi renders in textareas */
        .pdf-field-input[data-gurmukhi="true"],
        .gurmukhi { font-family: 'Noto Sans Gurmukhi', 'NotoSansGurmukhi', serif !important; }

        /* ---- HEADER ---- */
        #header {
            height: var(--toolbar-h); background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px; padding: 0 12px; flex-shrink: 0; z-index: 100;
            flex-wrap: wrap;
        }
        .logo { font-weight: 800; font-size: 15px; color: var(--accent); letter-spacing: -0.5px; margin-right: 4px; white-space: nowrap; }
        .logo span { color: var(--text); }
        .hbtn {
            background: transparent; border: 1px solid transparent; color: var(--muted); border-radius: 6px;
            padding: 5px 10px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px;
            transition: all .15s; white-space: nowrap;
        }
        .hbtn:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
        .hbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .hbtn.primary:hover { background: #4a5de0; }
        .hbtn.success { background: var(--green); color: #fff; border-color: var(--green); }
        .hbtn:disabled { opacity: .35; cursor: not-allowed; }
        .hbtn.active { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
        .hdivider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
        .hsep { flex: 1; }

        /* ---- TOOLBAR ---- */
        #toolbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: none; align-items: center; gap: 6px; padding: 6px 12px; flex-shrink: 0;
            flex-wrap: wrap;
        }
        #toolbar.visible { display: flex; }
        .tlabel { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
        .tbtn {
            background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
            border-radius: 5px; padding: 4px 8px; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 4px; transition: all .15s;
        }
        .tbtn:hover { color: var(--text); border-color: var(--accent); }
        .tbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tinput {
            background: var(--surface2); border: 1px solid var(--border); color: var(--text);
            border-radius: 5px; padding: 4px 7px; font-size: 12px; outline: none; width: 56px;
        }
        .tinput:focus { border-color: var(--accent); }
        .tcolor { width: 28px; height: 28px; border-radius: 5px; border: 2px solid var(--border); cursor: pointer; padding: 1px; background: transparent; }
        select.tinput { width: auto; cursor: pointer; }

        /* ---- LAYOUT ---- */
        #layout { display: flex; flex: 1; overflow: hidden; }

        /* ---- SIDEBAR ---- */
        #sidebar {
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
        }
        #sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .stab {
            flex: 1; padding: 8px 4px; font-size: 11px; text-align: center; cursor: pointer;
            color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s;
        }
        .stab.active { color: var(--accent); border-color: var(--accent); }
        #sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        #sidebar-content::-webkit-scrollbar { width: 4px; }
        #sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sprop-group { margin-bottom: 14px; }
        .sprop-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; display: block; }
        .sprop-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .sprop-input {
            background: var(--surface2); border: 1px solid var(--border); color: var(--text);
            border-radius: 5px; padding: 5px 8px; font-size: 12px; outline: none; width: 100%;
        }
        .sprop-input:focus { border-color: var(--accent); }
        .sprop-btn {
            background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
            border-radius: 5px; padding: 5px 8px; font-size: 11px; cursor: pointer; transition: all .15s;
            display: flex; align-items: center; gap: 4px; white-space: nowrap;
        }
        .sprop-btn:hover { color: var(--text); border-color: var(--accent); }
        .sprop-btn.danger:hover { color: var(--red); border-color: var(--red); }

        /* layers panel */
        .layer-item {
            display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px;
            cursor: pointer; font-size: 12px; margin-bottom: 3px; border: 1px solid transparent;
        }
        .layer-item:hover { background: var(--surface2); }
        .layer-item.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
        .layer-icon { width: 22px; text-align: center; color: var(--muted); font-size: 11px; }
        .layer-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .layer-vis { color: var(--muted); font-size: 11px; cursor: pointer; }

        /* pages thumbnail */
        .page-thumb {
            border: 2px solid var(--border); border-radius: 6px; cursor: pointer;
            margin-bottom: 8px; overflow: hidden; background: #fff; transition: all .15s;
        }
        .page-thumb.active { border-color: var(--accent); }
        .page-thumb canvas { width: 100%; display: block; }
        .page-thumb-label { text-align: center; font-size: 10px; color: var(--muted); padding: 3px; background: var(--surface); }

        /* ---- CANVAS AREA ---- */
        #main-area { flex: 1; overflow: auto; background: var(--bg); display: flex; justify-content: center; align-items: flex-start; padding: 32px; position: relative; }
        #main-area::-webkit-scrollbar { width: 8px; height: 8px; }
        #main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        #empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; width: 100%; color: var(--muted); text-align: center; gap: 14px;
        }
        .empty-icon { font-size: 64px; color: var(--border); }
        .empty-title { font-size: 20px; font-weight: 600; color: #475569; }
        .empty-sub { font-size: 13px; color: var(--muted); }
        .empty-drop {
            border: 2px dashed var(--border); border-radius: 12px; padding: 28px 48px;
            cursor: pointer; transition: all .2s; margin-top: 8px;
        }
        .empty-drop:hover { border-color: var(--accent); color: var(--accent); }

        #pdf-wrapper {
            position: relative; display: inline-block; background: white;
            box-shadow: 0 20px 60px rgba(0,0,0,.5); flex-shrink: 0;
        }
        canvas#pdf-canvas { display: block; }

        /* ---- FIELD ELEMENTS ---- */
        .pdf-field-container {
            position: absolute; z-index: 50; user-select: none; touch-action: none;
        }
        .pdf-field-container.active { z-index: 60; }
        .pdf-field-container.locked { opacity: .6; pointer-events: none; }
        .pdf-field-container.hidden-layer { opacity: 0; pointer-events: none; }

        .pdf-field-input {
            background: transparent; border: 1px dashed transparent; color: #000;
            font-family: sans-serif; padding: 3px 5px; outline: none;
            min-width: 50px; white-space: pre-wrap; transition: border .15s;
            resize: none; overflow: hidden; cursor: text; line-height: 1.4;
        }
        .pdf-field-container:hover .pdf-field-input,
        .pdf-field-container.active .pdf-field-input { border-color: #3b82f6; background: rgba(59,130,246,.06); }

        .pdf-image-wrapper {
            border: 2px dashed transparent; position: relative;
            box-sizing: border-box; touch-action: none; overflow: hidden;
        }
        .pdf-image-wrapper img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; display: block; }
        .pdf-field-container:hover .pdf-image-wrapper,
        .pdf-field-container.active .pdf-image-wrapper { border-color: #3b82f6; }

        /* shape element */
        .pdf-shape-wrapper {
            border: 2px dashed transparent; position: relative; box-sizing: border-box;
            touch-action: none; display: flex; align-items: center; justify-content: center;
        }
        .pdf-field-container:hover .pdf-shape-wrapper,
        .pdf-field-container.active .pdf-shape-wrapper { border-color: #3b82f6; }
        .pdf-shape-inner { width: 100%; height: 100%; }

        /* Resize handles */
        .resize-handle {
            position: absolute; width: 10px; height: 10px; background: white;
            border: 2px solid #3b82f6; border-radius: 2px; display: none; z-index: 10; touch-action: none;
        }
        .pdf-field-container.active .resize-handle { display: block; }
        .resize-handle.nw { top:-5px; left:-5px; cursor:nwse-resize; }
        .resize-handle.n  { top:-5px; left:calc(50% - 5px); cursor:ns-resize; }
        .resize-handle.ne { top:-5px; right:-5px; cursor:nesw-resize; }
        .resize-handle.e  { top:calc(50% - 5px); right:-5px; cursor:ew-resize; }
        .resize-handle.se { bottom:-5px; right:-5px; cursor:nwse-resize; }
        .resize-handle.s  { bottom:-5px; left:calc(50% - 5px); cursor:ns-resize; }
        .resize-handle.sw { bottom:-5px; left:-5px; cursor:nesw-resize; }
        .resize-handle.w  { top:calc(50% - 5px); left:-5px; cursor:ew-resize; }

        /* Rotate handle */
        .rotate-handle {
            position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 20px; background: var(--green); border-radius: 50%;
            cursor: grab; display: none; z-index: 10; touch-action: none;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 10px;
        }
        .rotate-handle::before { content: ''; position: absolute; width: 2px; height: 20px; background: var(--green); top: 18px; left: 9px; }
        .rotate-handle:active { cursor: grabbing; }
        .pdf-field-container.active .rotate-handle { display: flex; }

        /* Duplicate handle */
        .dup-handle {
            position: absolute; top: -38px; right: 0;
            width: 20px; height: 20px; background: var(--accent); border-radius: 50%;
            cursor: pointer; display: none; z-index: 10;
            align-items: center; justify-content: center; color: white; font-size: 10px;
        }
        .pdf-field-container.active .dup-handle { display: flex; }

        /* Field controls bar */
        .field-controls {
            display: none; position: absolute; top: -35px; left: 0; right: 0;
            justify-content: space-between; z-index: 20; gap: 3px;
        }
        .pdf-field-container.active .field-controls { display: flex; }
        .fc-btn {
            background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
            width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--muted); font-size: 10px; touch-action: none; transition: all .15s;
        }
        .fc-btn:hover { color: var(--text); border-color: var(--accent); }
        .fc-btn.danger:hover { color: var(--red); border-color: var(--red); }
        .fc-btn.drag { cursor: grab; }
        .fc-btn.drag:active { cursor: grabbing; }

        /* ---- ZOOM BAR ---- */
        #zoom-bar {
            position: fixed; bottom: 16px; right: 16px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px; display: none;
            align-items: center; gap: 4px; padding: 6px 10px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,.4);
        }
        #zoom-bar.visible { display: flex; }
        .zbtn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 5px; width: 28px; height: 28px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .zbtn:hover { border-color: var(--accent); }
        #zoom-label { font-size: 12px; color: var(--muted); min-width: 40px; text-align: center; }

        /* ---- PAGE NAV ---- */
        #page-nav {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            display: none; align-items: center; gap: 8px; padding: 6px 14px; z-index: 200;
            box-shadow: 0 4px 16px rgba(0,0,0,.4);
        }
        #page-nav.visible { display: flex; }
        .pnbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; }
        .pnbtn:hover { color: var(--text); background: var(--surface2); }
        #page-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 2px 6px; font-size: 12px; outline: none; width: 36px; text-align: center; }

        /* ---- CONTEXT MENU ---- */
        #ctx-menu {
            position: fixed; background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px; z-index: 500; display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,.5); min-width: 170px;
        }
        .cm-item {
            display: flex; align-items: center; gap: 8px; padding: 7px 10px; font-size: 12px;
            cursor: pointer; border-radius: 5px; color: var(--text); transition: all .1s;
        }
        .cm-item:hover { background: var(--surface2); color: var(--accent); }
        .cm-item.danger:hover { color: var(--red); }
        .cm-item i { width: 14px; text-align: center; color: var(--muted); }
        .cm-sep { height: 1px; background: var(--border); margin: 3px 0; }

        /* ---- MODALS ---- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 24px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.6);
        }
        .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
        .modal-input {
            background: var(--surface2); border: 1px solid var(--border); color: var(--text);
            border-radius: 7px; padding: 8px 12px; font-size: 13px; outline: none; width: 100%; margin-bottom: 10px;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
        .modal-btn {
            padding: 7px 16px; border-radius: 7px; font-size: 13px; cursor: pointer; border: none; font-weight: 600;
        }
        .modal-btn.cancel { background: var(--surface2); color: var(--text); }
        .modal-btn.ok { background: var(--accent); color: #fff; }

        /* ---- TOAST ---- */
        #toast {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 9px 18px; font-size: 12px; z-index: 300; opacity: 0;
            transition: opacity .3s; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.4);
        }
        #toast.show { opacity: 1; }

        /* ---- RULERS ---- */
        #ruler-h, #ruler-v {
            position: absolute; background: var(--surface); z-index: 10;
            display: none; pointer-events: none;
        }
        #ruler-h { top: 0; left: 20px; right: 0; height: 20px; border-bottom: 1px solid var(--border); }
        #ruler-v { top: 20px; left: 0; bottom: 0; width: 20px; border-right: 1px solid var(--border); }

        /* ---- SELECTION BOX ---- */
        #selection-box {
            position: absolute; border: 1px dashed #3b82f6; background: rgba(59,130,246,.08);
            pointer-events: none; display: none; z-index: 55;
        }

        /* ---- LOADING ---- */
        #loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 2000;
            display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
        }
        #loading-overlay.open { display: flex; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- GRID OVERLAY ---- */
        .grid-bg {
            background-image: linear-gradient(rgba(59,130,246,.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59,130,246,.08) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* SCROLLBARS */
        #main-area::-webkit-scrollbar { width: 8px; height: 8px; }
        #main-area::-webkit-scrollbar-track { background: var(--bg); }
        #main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #sidebar { display: none; }
           :root{ --sidebar-w: 0px;}
            #header { gap: 4px; }
        }

        /* drag over */
        .drag-over { outline: 3px dashed var(--accent) !important; }
    </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
    <div class="logo">PDF<span>Studio</span> <span style="color:var(--yellow);font-size:10px;vertical-align:top;">PRO</span></div>
    <div class="hdivider"></div>

    <!-- File ops -->
    <label class="hbtn" title="Open PDF">
        <i class="fa-solid fa-folder-open"></i> <span class="hidden-sm">Open</span>
        <input type="file" id="upload-pdf" accept="application/pdf" class="hidden" style="display:none">
    </label>
    <button class="hbtn" id="btn-new-page" title="New blank page" style="display:none"><i class="fa-regular fa-file-plus"></i></button>
    <div class="hdivider"></div>

    <!-- Undo/Redo -->
    <button class="hbtn" id="undo-btn" disabled title="Undo (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i></button>
    <button class="hbtn" id="redo-btn" disabled title="Redo (Ctrl+Y)"><i class="fa-solid fa-rotate-right"></i></button>
    <div class="hdivider"></div>

    <!-- Tools -->
    <button class="hbtn" id="tool-select" title="Select tool (V)" data-tool="select"><i class="fa-solid fa-arrow-pointer"></i></button>
    <button class="hbtn active" id="tool-text" title="Text tool (T)" data-tool="text"><i class="fa-solid fa-text-height"></i></button>
    <label class="hbtn" id="tool-image" title="Add Image" style="cursor:pointer;"><i class="fa-regular fa-image"></i> <span class="hidden-sm">Image</span><input type="file" id="upload-image" accept="image/png,image/jpeg,image/gif,image/webp,image/svg+xml" style="display:none" multiple></label>
    <button class="hbtn" id="tool-shape" title="Shapes" data-tool="shape"><i class="fa-regular fa-shapes"></i></button>
    <div class="hdivider"></div>

    <!-- View -->
    <button class="hbtn" id="btn-grid" title="Toggle grid"><i class="fa-solid fa-hashtag"></i></button>
    <button class="hbtn" id="btn-ruler" title="Toggle rulers"><i class="fa-solid fa-ruler-combined"></i></button>
    <button class="hbtn" id="btn-sidebar" title="Toggle sidebar"><i class="fa-solid fa-sidebar"></i></button>
    <div class="hdivider"></div>

    <div class="hsep"></div>

    <!-- Actions -->
    <button class="hbtn" id="btn-select-all" title="Select all (Ctrl+A)"><i class="fa-solid fa-object-group"></i></button>
    <button class="hbtn" id="btn-clear-all" title="Clear all elements"><i class="fa-solid fa-eraser"></i></button>
    <button class="hbtn success" id="download-btn" title="Export PDF" style="display:none"><i class="fa-solid fa-download"></i> Export</button>
</div>

<!-- FORMATTING TOOLBAR -->
<div id="toolbar">
    <span class="tlabel">Text</span>
    <button class="tbtn format-toggle" data-format="bold" title="Bold (Ctrl+B)"><i class="fa-solid fa-bold"></i></button>
    <button class="tbtn format-toggle" data-format="italic" title="Italic (Ctrl+I)"><i class="fa-solid fa-italic"></i></button>
    <button class="tbtn format-toggle" data-format="underline" title="Underline"><i class="fa-solid fa-underline"></i></button>
    <button class="tbtn format-toggle" data-format="strikethrough" title="Strikethrough"><i class="fa-solid fa-strikethrough"></i></button>
    <div class="hdivider"></div>
    <button class="tbtn align-toggle active" data-align="left"><i class="fa-solid fa-align-left"></i></button>
    <button class="tbtn align-toggle" data-align="center"><i class="fa-solid fa-align-center"></i></button>
    <button class="tbtn align-toggle" data-align="right"><i class="fa-solid fa-align-right"></i></button>
    <div class="hdivider"></div>
    <select class="tinput" id="font-family-select" title="Font family">
        <option value="Helvetica, sans-serif">Helvetica</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Verdana, sans-serif">Verdana</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
        <option value="Impact, sans-serif">Impact</option>
        <option value="'NotoSansGurmukhi', sans-serif">ਨੋਟੋ ਗੁਰਮੁਖੀ (Punjabi)</option>
    </select>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

function updateHistoryButtons() { document.getElementById('undo-btn').disabled = historyIndex === 0; document.getElementById('redo-btn').disabled = historyIndex === historyStack.length - 1; }

}
['upload-pdf','drop-pdf-input'].forEach(id => { document.getElementById(id).addEventListener('change', e => { const file = e.target.files[0]; if (!file) return; const fr = new FileReader(); fr.onload = ev => loadPDFBytes(ev.target.result); fr.readAsArrayBuffer(file); e.target.value = ''; }); });
document.getElementById('main-area').addEventListener('dragover', e => { e.preventDefault(); document.getElementById('pdf-wrapper').classList.add('drag-over'); });

document.getElementById('main-area').addEventListener('drop', e => { e.preventDefault(); document.getElementById('pdf-wrapper').classList.remove('drag-over'); const file = e.dataTransfer.files[0]; if (!file) return; if (file.type === 'application/pdf') { const fr = new FileReader(); fr.onload = ev => loadPDFBytes(ev.target.result); fr.readAsArrayBuffer(file); } else if (file.type.startsWith('image/')) { const fr = new FileReader(); fr.onload = ev => addImageFromSrc(ev.target.result, file.type); fr.readAsDataURL(file); } });

let _currentRenderTask = null;

    showLoading('Rendering page…');
    pdfDoc.getPage(num).then(page => {
        const unscaled = page.getViewport({ scale: 1 }), containerW = document.getElementById('main-area').clientWidth - 64;
        scale = Math.min(containerW / unscaled.width, 1.5) * userScale;
        const vp = page.getViewport({ scale }), dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(vp.width * dpr); canvas.height = Math.floor(vp.height * dpr); canvas.style.width = Math.floor(vp.width) + 'px'; canvas.style.height = Math.floor(vp.height) + 'px';

}
document.getElementById('prev-page').addEventListener('click', () => goPage(pageNum - 1)); document.getElementById('next-page').addEventListener('click', () => goPage(pageNum + 1)); document.getElementById('page-input').addEventListener('change', e => goPage(parseInt(e.target.value)));
function goPage(n) { if (!pdfDoc) return; n = Math.max(1, Math.min(pdfDoc.numPages, n)); if (n === pageNum) return; setActiveField(null); pageNum = n; renderPage(pageNum); }

document.getElementById('zoom-in').addEventListener('click', () => { userScale = Math.min(userScale + 0.15, 4); renderPage(pageNum); }); document.getElementById('zoom-out').addEventListener('click', () => { userScale = Math.max(userScale - 0.15, 0.3); renderPage(pageNum); }); document.getElementById('zoom-fit').addEventListener('click', () => { userScale = 1; renderPage(pageNum); });
document.getElementById('main-area').addEventListener('wheel', e => { if (!e.ctrlKey) return; e.preventDefault(); userScale = e.deltaY < 0 ? Math.min(userScale + 0.1, 4) : Math.max(userScale - 0.1, 0.3); renderPage(pageNum); }, { passive: false });

function setActiveTool(toolName) { currentTool = toolName; document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active')); const activeBtn = document.querySelector(`[data-tool="${toolName}"]`); if (activeBtn) activeBtn.classList.add('active'); }
document.querySelectorAll('[data-tool]').forEach(btn => btn.addEventListener('click', () => { if (btn.dataset.tool === 'shape') { document.getElementById('shape-modal').classList.add('open'); return; } setActiveTool(btn.dataset.tool); }));

function toScreen(pdfVal) { return pdfVal * scale; } function toPdf(screenVal) { return screenVal / scale; }

wrapper.addEventListener('click', e => {
    if (e.target !== canvas) { if (!e.target.closest('.pdf-field-container')) setActiveField(null); return; }
    if (currentTool !== 'text') return;
    const rect = wrapper.getBoundingClientRect();
    const field = { id: `field_${Date.now()}`, type: 'text', page: pageNum, x: toPdf(e.clientX - rect.left), y: toPdf(e.clientY - rect.top), text: '', fontSize: 16, color: '#000000', fontFamily: 'Helvetica, sans-serif', bold: false, italic: false, underline: false, strikethrough: false, align: 'left', width: toPdf(180), height: toPdf(36), rotation: 0, opacity: 1, bgColor: 'transparent', showBg: false, locked: false, hidden: false, flipH: false, flipV: false, link: '', zIndex: getFields().length };
    getFields().push(field); saveState(); renderStateToDOM();

});

document.getElementById('upload-image').addEventListener('change', e => { Array.from(e.target.files).forEach(file => { const reader = new FileReader(); reader.onload = ev => addImageFromSrc(ev.target.result, file.type); reader.readAsDataURL(file); }); e.target.value = ''; });
function addImageFromSrc(src, mimeType) { const img = new Image(); img.onload = () => { let w = img.width, h = img.height; const maxW = (wrapper.offsetWidth || 400) * 0.5; if (w > maxW) { h = (maxW / w) * h; w = maxW; } const field = { id: `img_${Date.now()}`, type: 'image', page: pageNum, x: toPdf(60), y: toPdf(60), width: toPdf(w), height: toPdf(h), src, rotation: 0, opacity: 1, locked: false, hidden: false, flipH: false, flipV: false, zIndex: getFields().length, mimeType: mimeType || 'image/png' }; getFields().push(field); saveState(); renderStateToDOM(); toast('Image added'); }; img.src = src; }

document.querySelectorAll('.shape-pick').forEach(btn => { btn.addEventListener('click', () => { const shape = btn.dataset.shape; const fill = document.getElementById('shape-fill').value; const stroke = document.getElementById('shape-stroke').value; const sw = parseInt(document.getElementById('shape-stroke-w').value) || 2; const field = { id: `shape_${Date.now()}`, type: 'shape', page: pageNum, x: toPdf(100), y: toPdf(100), width: toPdf(150), height: toPdf(100), shape, fill, stroke, strokeWidth: sw, rotation: 0, opacity: 1, locked: false, hidden: false, flipH: false, flipV: false, zIndex: getFields().length }; getFields().push(field); saveState(); renderStateToDOM(); document.getElementById('shape-modal').classList.remove('open'); toast('Shape added'); }); }); document.getElementById('shape-cancel').addEventListener('click', () => document.getElementById('shape-modal').classList.remove('open'));
function buildShapeSVG(field, screenW, screenH) { const { shape, fill, stroke, strokeWidth: sw } = field; const w = screenW !== undefined ? screenW : toScreen(field.width), h = screenH !== undefined ? screenH : toScreen(field.height); let inner = ''; if (shape === 'rect') inner = `<rect x="${sw/2}" y="${sw/2}" width="${w-sw}" height="${h-sw}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" rx="4"/>`; else if (shape === 'circle') inner = `<ellipse cx="${w/2}" cy="${h/2}" rx="${w/2-sw/2}" ry="${h/2-sw/2}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`; else if (shape === 'line') inner = `<line x1="0" y1="${h/2}" x2="${w}" y2="${h/2}" stroke="${stroke}" stroke-width="${sw}"/>`; else if (shape === 'arrow') inner = `<defs><marker id="ah${field.id}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${stroke}"/></marker></defs><line x1="${sw}" y1="${h/2}" x2="${w-10}" y2="${h/2}" stroke="${stroke}" stroke-width="${sw}" marker-end="url(#ah${field.id})"/>`; else if (shape === 'triangle') inner = `<polygon points="${w/2},${sw} ${w-sw},${h-sw} ${sw},${h-sw}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`; else if (shape === 'star') inner = `<polygon points="${starPoints(w/2, h/2, 5, Math.min(w,h)/2-sw, Math.min(w,h)/4)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`; else if (shape === 'diamond') inner = `<polygon points="${w/2},${sw} ${w-sw},${h/2} ${w/2},${h-sw} ${sw},${h/2}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`; else if (shape === 'hexagon') inner = `<polygon points="${hexPoints(w/2, h/2, Math.min(w,h)/2 - sw)}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`; return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">${inner}</svg>`; }
function starPoints(cx, cy, n, r, ir) { let pts = []; for (let i = 0; i < n * 2; i++) { const angle = (i * Math.PI / n) - Math.PI / 2; const radius = i % 2 === 0 ? r : ir; pts.push(`${cx + radius * Math.cos(angle)},${cy + radius * Math.sin(angle)}`); } return pts.join(' '); } function hexPoints(cx, cy, r) { return Array.from({ length: 6 }, (_, i) => { const a = (Math.PI / 3) * i - Math.PI / 6; return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`; }).join(' '); }

    document.querySelectorAll('.pdf-field-container').forEach(el => el.remove()); const fields = getFields(); const sorted = [...fields].sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));

        const sx = toScreen(field.x || 0), sy = toScreen(field.y || 0), sw = toScreen(field.width || 100), sh = toScreen(field.height || 36);

            const td = field.strikethrough ? 'line-through' : (field.underline ? 'underline' : 'none'); const flipT = [field.flipH ? 'scaleX(-1)' : '', field.flipV ? 'scaleY(-1)' : ''].filter(Boolean).join(' ') || 'none'; const bgStyle = field.showBg ? `background:${field.bgColor||'transparent'};` : ''; const isGurmukhi = (field.fontFamily || '').includes('NotoSansGurmukhi') || /[\u0A00-\u0A7F]/.test(field.text || ''); const displayFont = isGurmukhi ? "'Noto Sans Gurmukhi', 'NotoSansGurmukhi', serif" : (field.fontFamily || 'Helvetica, sans-serif'); const screenFontSize = (field.fontSize || 16) * scale; const styles = `font-size:${screenFontSize}px;color:${field.color||'#000'};font-weight:${field.bold?'bold':'normal'};font-style:${field.italic?'italic':'normal'};text-decoration:${td};text-align:${field.align||'left'};width:${sw}px;font-family:${displayFont};transform:${flipT};${bgStyle}`;
            contentHtml = `<textarea class="pdf-field-input" placeholder="Type… / ਟਾਈਪ ਕਰੋ" style="${styles}" ${isGurmukhi ? 'data-gurmukhi="true"' : ''}>${escHtml(field.text||'')}</textarea>`;
        } else if (field.type === 'image') {
            const flipT = [field.flipH ? 'scaleX(-1)' : '', field.flipV ? 'scaleY(-1)' : ''].filter(Boolean).join(' ') || 'none';
            contentHtml = `<div class="pdf-image-wrapper" style="width:${sw}px;height:${sh}px;transform:${flipT};"><img src="${field.src}" draggable="false"/>${resizeHandlesHTML()}<div class="rotate-handle" title="Rotate"><i class="fa-solid fa-rotate"></i></div><div class="dup-handle" title="Duplicate"><i class="fa-regular fa-copy"></i></div></div>`;
        } else if (field.type === 'shape') {
            const flipT = [field.flipH ? 'scaleX(-1)' : '', field.flipV ? 'scaleY(-1)' : ''].filter(Boolean).join(' ') || 'none'; const svg = buildShapeSVG(field, sw, sh);

}

document.getElementById('download-btn').addEventListener('click', async () => {
    
    // 1. Force the active text box to save instantly before exporting
    document.querySelectorAll('.pdf-field-input').forEach(input => {
        const container = input.closest('.pdf-field-container');
        if (container) {
            const field = safeField(container.id);
            if (field) field.text = input.value;
        }
    });
    saveState();

    const btn = document.getElementById('download-btn'); 
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Exporting…'; 
    btn.disabled = true; 
    showLoading('Generating PDF…');

    try {
        setActiveField(null); 
        if (!pdfBytes) throw new Error('No PDF loaded');
        const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;
        const pdfDocEdit = await PDFDocument.load(pdfBytes);

        // Standard English Fonts
        const fReg = await pdfDocEdit.embedFont(StandardFonts.Helvetica);
        const fBold = await pdfDocEdit.embedFont(StandardFonts.HelveticaBold);
        const fItalic = await pdfDocEdit.embedFont(StandardFonts.HelveticaOblique);
        const fBI = await pdfDocEdit.embedFont(StandardFonts.HelveticaBoldOblique);

        // Auto-detect Punjabi text
        function hasGurmukhi(text) { return /[\u0A00-\u0A7F]/.test(text); }
        function isGurmukhiField(field) { 
            return (field.fontFamily || '').toLowerCase().includes('gurmukhi') || hasGurmukhi(field.text || ''); 
        }
        function safeNum(v, fallback = 0) { const n = Number(v); return (isFinite(n) && !isNaN(n)) ? n : fallback; }
        function safeCoords(x, y) { return { x: safeNum(x), y: safeNum(y) }; }

        const pages = pdfDocEdit.getPages();
        const fields = getFields();

        for (const field of fields) {
            try {
                if (!field || field.hidden) continue;
                if (!field.page || field.page < 1 || field.page > pages.length) continue;
                const page = pages[field.page - 1]; if (!page) continue;
                const pH = safeNum(page.getHeight(), 842);
                const fx = safeNum(field.x, 0), fy = safeNum(field.y, 0), fw = safeNum(field.width, 100), fh = safeNum(field.height, 50), rot = safeNum(field.rotation, 0), opac = Math.max(0, Math.min(1, safeNum(field.opacity, 1)));

                if (field.type === 'text') {
                    if (!field.text || !field.text.trim()) continue;

                    const fs = safeNum(field.fontSize, 16), lh = fs * 1.3;
                    const lines = field.text.split('\n');

                    // 🛠️ THE GUARANTEED PUNJABI FIX (High-Res Snapshot Method) 🛠️
                    if (isGurmukhiField(field)) {
                        const dpr = 4; // 4x Resolution for crystal clear text
                        const c = document.createElement('canvas');
                        const tCtx = c.getContext('2d');
                        
                        // Use native browser font rendering
                        const fontStr = `${field.bold ? 'bold ' : ''}${field.italic ? 'italic ' : ''}${fs * dpr}px 'Noto Sans Gurmukhi', 'Nirmala UI', sans-serif`;
                        tCtx.font = fontStr;
                        
                        let maxW = 0;
                        lines.forEach(l => maxW = Math.max(maxW, tCtx.measureText(l).width));
                        if(maxW === 0) maxW = 10;
                        
                        c.width = maxW; 
                        c.height = lines.length * (lh * dpr);
                        
                        tCtx.font = fontStr;
                        tCtx.fillStyle = field.color || '#000000';
                        tCtx.textBaseline = 'top';
                        
                        // Draw text exactly as it looks on screen
                        let curYCanvas = 0;
                        lines.forEach((line) => {
                            let lx = 0;
                            const tw = tCtx.measureText(line).width;
                            if (field.align === 'center') lx = (maxW - tw) / 2;
                            if (field.align === 'right') lx = maxW - tw;
                            tCtx.fillText(line, lx, curYCanvas);
                            curYCanvas += (lh * dpr);
                        });

                        // Convert snapshot to image and stamp into PDF
                        const imgDataUrl = c.toDataURL('image/png');
                        const pngBytes = await fetch(imgDataUrl).then(r => r.arrayBuffer());
                        const pdfImg = await pdfDocEdit.embedPng(pngBytes);
                        
                        let alignOffsetX = 0;
                        const cw = safeNum(field.width, maxW/dpr);
                        if (field.align === 'center') alignOffsetX = (cw - (maxW/dpr))/2;
                        if (field.align === 'right') alignOffsetX = cw - (maxW/dpr);
                        
                        // 🛠️ ALIGNMENT FIX: Adjust to match the exact CSS padding of the HTML textarea
                        page.drawImage(pdfImg, {
                            x: fx + alignOffsetX + 4, // +4px perfectly aligns the left padding
                            y: pH - fy - (lines.length * lh) - (fs * 0.05) - 3, // Pushes it down to match the visual baseline
                            width: maxW / dpr,
                            height: c.height / dpr,
                            opacity: opac,
                            rotate: degrees(-rot)
                        });
                        continue; 
                    }

                    // NORMAL ENGLISH TEXT RENDERER
                    let fnt = fReg;
                    if (field.bold && field.italic) fnt = fBI; else if (field.bold) fnt = fBold; else if (field.italic) fnt = fItalic;
                    const { r, g, b } = hexToRgb(field.color || '#000000');
                    let curY = pH - fy - fs;

                    for (const line of lines) {
                        if (!line) { curY -= lh; continue; }
                        let tw = 0; try { tw = safeNum(fnt.widthOfTextAtSize(line, fs), 0); } catch(_) {}
                        let alignX = safeNum(fx, 0); const cw = safeNum(fw, 0);
                        if (field.align === 'center' && tw > 0) alignX += (cw - tw) / 2;
                        if (field.align === 'right' && tw > 0) alignX += cw - tw;
                        if (!isFinite(alignX)) alignX = 0; if (!isFinite(curY)) { curY -= lh; continue; }

                        page.drawText(line, { x: alignX, y: curY, size: Math.max(1, fs), font: fnt, color: rgb(r, g, b), rotate: degrees(-rot), opacity: opac });
                        if (field.underline && tw > 0) page.drawLine({ start: safeCoords(alignX, curY - 2), end: safeCoords(alignX + tw, curY - 2), thickness: 0.8, color: rgb(r, g, b) });
                        if (field.strikethrough && tw > 0) page.drawLine({ start: safeCoords(alignX, curY + fs * 0.35), end: safeCoords(alignX + tw, curY + fs * 0.35), thickness: 0.8, color: rgb(r, g, b) });
                        curY -= lh;
                    }
                } else if (field.type === 'image') {
                    if (!field.src) continue;
                    let imgBytes; try { imgBytes = await fetch(field.src).then(res => res.arrayBuffer()); } catch(_) { continue; }
                    let pdfImg; try { const mime = field.mimeType || ''; if (mime.includes('jpeg') || mime.includes('jpg') || field.src.startsWith('data:image/jpeg')) { pdfImg = await pdfDocEdit.embedJpg(imgBytes); } else { pdfImg = await pdfDocEdit.embedPng(imgBytes); } } catch(_) { try { pdfImg = await pdfDocEdit.embedPng(imgBytes); } catch(_2) { continue; } }
                    if (!pdfImg) continue;
                    const pw = safeNum(fw, 50), ph2 = safeNum(fh, 50); if (pw <= 0 || ph2 <= 0) continue;
                    const cx = safeNum(fx + pw / 2, 0), cy = safeNum(pH - fy - ph2 / 2, 0), rad = -rot * Math.PI / 180, rdx = safeNum((-pw/2) * Math.cos(rad) - (-ph2/2) * Math.sin(rad), 0), rdy = safeNum((-pw/2) * Math.sin(rad) + (-ph2/2) * Math.cos(rad), 0);
                    page.drawImage(pdfImg, { x: safeNum(cx + rdx), y: safeNum(cy + rdy), width: pw, height: ph2, rotate: degrees(-rot), opacity: opac });
                } else if (field.type === 'shape') {
                    const pw = safeNum(fw, 50), ph2 = safeNum(fh, 50); if (pw <= 0 || ph2 <= 0) continue;
                    const sx = safeNum(fx, 0), sy = safeNum(pH - fy - ph2, 0);
                    const { r: fr, g: fg, b: fb } = hexToRgb(field.fill || '#3b82f6'), { r: sr, g: sg, b: sb } = hexToRgb(field.stroke || '#1d4ed8');
                    const sw2 = Math.max(0, safeNum(field.strokeWidth, 2)), fillC = rgb(fr, fg, fb), strokeC = rgb(sr, sg, sb);
                    if (field.shape === 'rect') { page.drawRectangle({ x: sx, y: sy, width: pw, height: ph2, color: fillC, borderColor: strokeC, borderWidth: sw2, opacity: opac }); } else if (field.shape === 'circle') { page.drawEllipse({ x: safeNum(sx + pw/2), y: safeNum(sy + ph2/2), xScale: pw/2, yScale: ph2/2, color: fillC, borderColor: strokeC, borderWidth: sw2, opacity: opac }); } else if (field.shape === 'line') { page.drawLine({ start: safeCoords(sx, sy + ph2/2), end: safeCoords(sx + pw, sy + ph2/2), thickness: Math.max(0.5, sw2 * 2), color: strokeC, opacity: opac }); } else if (['triangle', 'star', 'diamond', 'hexagon', 'arrow'].includes(field.shape)) { page.drawRectangle({ x: sx, y: sy, width: pw, height: ph2, color: fillC, borderColor: strokeC, borderWidth: sw2, opacity: opac }); }
                }
            } catch (fieldErr) {}
        }

        const pdfBlobBytes = await pdfDocEdit.save(); 
        const blob = new Blob([pdfBlobBytes], { type: 'application/pdf' }); 
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob); 
        a.download = 'PDFStudio_Export.pdf'; 
        document.body.appendChild(a); 
        a.click(); 
        document.body.removeChild(a); 
        toast('PDF exported successfully ✓');
    } catch (err) { 
        console.error('Export error:', err); 
        toast('Export failed: ' + err.message, true); 
    } finally { 
        btn.innerHTML = orig; 
        btn.disabled = false; 
        hideLoading(); 
    }
});

document.getElementById('btn-new-page').addEventListener('click', async () => {
    if (!pdfDoc) return;
    try { const { PDFDocument } = PDFLib; const pdfDocEdit = await PDFDocument.load(pdfBytes); const [w, h] = pdfDocEdit.getPages()[0] ? [pdfDocEdit.getPage(0).getWidth(), pdfDocEdit.getPage(0).getHeight()] : [595, 842]; pdfDocEdit.addPage([w, h]); const newBytes = await pdfDocEdit.save(); pdfBytes = new Uint8Array(newBytes); const newDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise; pdfDoc = newDoc; const total = pdfDoc.numPages; document.getElementById('total-pages').textContent = total; document.getElementById('page-input').max = total; renderPageThumbs(); goPage(total); toast(`New blank page added (Page ${total})`); } catch(err) { toast('Failed to add page: ' + err.message, true); }
});

let autoSaveTimer = null;
function scheduleAutoSave() { clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(() => { try { if (!pdfDoc) return; localStorage.setItem('pdfstudio_autosave', JSON.stringify({ fields: JSON.parse(JSON.stringify(getFields())), pageNum, timestamp: Date.now() })); } catch(e) { } }, 2000); }
function hexToRgb(hex) { if (!hex || hex.length < 4) return { r: 0, g: 0, b: 0 }; const c = hex.replace('#', ''); const full = c.length === 3 ? c.split('').map(x => x + x).join('') : c; return { r: parseInt(full.slice(0,2), 16) / 255, g: parseInt(full.slice(2,4), 16) / 255, b: parseInt(full.slice(4,6), 16) / 255 }; }

function showLoading(msg) { document.getElementById('loading-text').textContent = msg || 'Loading…'; document.getElementById('loading-overlay').classList.add('open'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('open'); }
let toastTimer; function toast(msg, isError = false) { const el = document.getElementById('toast'); el.textContent = msg; el.style.borderColor = isError ? 'var(--red)' : 'var(--border)'; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500); }

window.addEventListener('beforeunload', e => { if (pdfDoc && getFields().length > 0) { e.preventDefault(); e.returnValue = ''; } });

const _realSaveState = saveState; window.saveState = function() { _realSaveState(); scheduleAutoSave(); };
document.getElementById('btn-sidebar').classList.add('active');
toast('Welcome to PDF Studio Pro! Open a PDF to begin.');
</script>
